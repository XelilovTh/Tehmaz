<!DOCTYPE html>
<html lang="az">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Developer Planner</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;600;700;800&display=swap');
        
        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
            background-color: #f8fafc;
            color: #1e293b;
            transition: background 0.3s ease;
        }

        .custom-scroll::-webkit-scrollbar { width: 5px; height: 5px; }
        .custom-scroll::-webkit-scrollbar-thumb { background: #cbd5e0; border-radius: 10px; }

        .day-card { transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1); cursor: pointer; border: 1px solid #e2e8f0; position: relative; }
        .day-card:hover { transform: translateY(-3px); box-shadow: 0 10px 20px rgba(59, 130, 246, 0.08); }
        
        .completed-card { background-color: #f0fdf4 !important; border-color: #22c55e !important; }
        .completed-card h4 { color: #166534; text-decoration: line-through; opacity: 0.7; }

        .selected-card { border-color: #3b82f6 !important; ring: 2px; ring-color: #3b82f6; background-color: #eff6ff !important; }

        .ai-message { border-radius: 18px; padding: 12px 16px; margin-bottom: 10px; font-size: 0.85rem; max-width: 85%; line-height: 1.6; }
        .user-message { background: #3b82f6; color: white; align-self: flex-end; border-bottom-right-radius: 4px; }
        .bot-message { background: #f1f5f9; color: #334155; align-self: flex-start; border-bottom-left-radius: 4px; border: 1px solid #e2e8f0; }

        .chat-full { position: fixed !important; inset: 20px !important; z-index: 50 !important; height: calc(100vh - 40px) !important; width: calc(100vw - 40px) !important; max-width: none !important; }
        
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        .animate-fade { animation: fadeIn 0.3s ease forwards; }

        .active-month { background: #3b82f6 !important; color: white !important; }
    </style>
</head>
<body class="bg-[#f8fafc]">

                                </div>
                                <div class="flex items-center gap-2">

                                </button>
                            </div>

                </div>
            </div>

    </div>

        function init() {
            renderMonthNav();
            updateHeader();
            changeWeek(1);
            updateProgressBar();
            addBotMessage("Salam! Sizin üçün 12 aylıq professional tədris proqramını (HTML -> CSS -> JS -> React -> Fullstack) hazırladım. Hər hansı bir günü seçib suallarınızı verə bilərsiniz.");
        }

        function renderMonthNav() {
            const nav = document.getElementById('month-nav');
            nav.innerHTML = "";
            months.forEach((m, i) => {
                const btn = document.createElement('button');
                btn.className = `w-full text-left p-3.5 rounded-2xl text-xs font-bold transition-all flex items-center gap-3 ${i === state.currentMonth ? 'active-month shadow-md' : 'text-slate-500 hover:bg-slate-50'}`;
                btn.onclick = () => {
                    state.currentMonth = i;
                    state.currentWeek = 1;
                    state.selectedDayId = null;
                    state.selectedTopic = null;
                    renderMonthNav();
                    updateHeader();
                    changeWeek(1);
                    document.getElementById('selected-topic-display').innerText = "Heç bir mövzu seçilməyib";
                };
                btn.innerHTML = `<span class="${i === state.currentMonth ? 'text-white' : 'text-blue-500'} font-black">${(i+1).toString().padStart(2, '0')}</span> <span class="hidden md:inline">${m}</span>`;
                nav.appendChild(btn);
            });
        }

        function renderDays() {
            const grid = document.getElementById('days-grid');
            grid.innerHTML = "";
            
            const monthData = curriculum[state.currentMonth] || curriculum[0];
            const weekData = monthData.weeks[state.currentWeek - 1];

            weekData.forEach((topic, i) => {
                const dayNum = (state.currentWeek - 1) * 7 + (i + 1);
                const dayId = `m${state.currentMonth}-w${state.currentWeek}-d${i}`;
                const isCompleted = state.completedTasks[dayId];
                const isSelected = state.selectedDayId === dayId;

                const card = document.createElement('div');
                card.className = `day-card animate-fade bg-white rounded-3xl p-5 flex flex-col h-[240px] ${isCompleted ? 'completed-card' : ''} ${isSelected ? 'selected-card shadow-lg ring-2 ring-blue-500' : ''}`;
                
                card.innerHTML = `
                    <div class="flex-grow">
                        <div class="flex justify-between items-start mb-4">
                            <span class="text-[9px] font-black text-slate-400 uppercase tracking-widest">${dayNames[i]}</span>
                            <div class="flex items-center gap-2">
                                ${isCompleted ? '<span class="text-emerald-600 text-xs">✔</span>' : ''}
                                <span class="w-7 h-7 rounded-xl bg-slate-100 flex items-center justify-center text-[10px] font-black text-slate-600">${dayNum}</span>
                            </div>
                        </div>
                        <h4 class="text-sm font-extrabold text-slate-800 leading-tight mb-4">${topic}</h4>
                    </div>
                    <div class="pt-4 border-t border-slate-50 flex items-center justify-between">
                         <span class="text-[9px] font-black ${isSelected ? 'text-blue-600' : 'text-slate-400'} uppercase">${isSelected ? "SEÇİLİB" : "SEÇ"}</span>
                         <span class="text-[8px] text-slate-400">${i >= 5 ? 'Həftəsonu' : 'Dərs'}</span>
                    </div>
                `;
                
                card.onclick = () => {
                    state.selectedDayId = dayId;
                    state.selectedTopic = topic;
                    document.getElementById('selected-topic-display').innerText = topic;
                    renderDays();
                    updateMarkBtn();
                };
                
                grid.appendChild(card);
            });
        }

        function updateMarkBtn() {
            const btn = document.getElementById('mark-complete-btn');
            if (state.completedTasks[state.selectedDayId]) {
                btn.innerText = "❌ Bitməyib kimi qeyd et";
                btn.className = "w-full py-3 rounded-2xl bg-slate-200 text-slate-700 text-xs font-bold hover:bg-slate-300 transition flex items-center justify-center gap-2";
            } else {
                btn.innerText = "✅ Mövzunu bitirdim";
                btn.className = "w-full py-3 rounded-2xl bg-emerald-600 text-white text-xs font-bold hover:bg-emerald-700 transition shadow-lg shadow-emerald-100 flex items-center justify-center gap-2";
            }
        }

        function toggleCompleteCurrent() {
            if (!state.selectedDayId) return;
            const id = state.selectedDayId;
            if (state.completedTasks[id]) {
                delete state.completedTasks[id];
            } else {
                state.completedTasks[id] = true;
            }
            localStorage.setItem('devPlanner2026_tasks', JSON.stringify(state.completedTasks));
            renderDays();
            updateMarkBtn();
            updateProgressBar();
        }

        function updateProgressBar() {
            const totalDays = 12 * 4 * 7; 
            const completedCount = Object.keys(state.completedTasks).length;
            const percent = Math.round((completedCount / totalDays) * 100);
            
            document.getElementById('global-progress-bar').style.width = percent + "%";
            document.getElementById('progress-text').innerText = percent + "% tamamlanıb";
        }

        function changeWeek(w) {
            state.currentWeek = w;
            const btns = document.querySelectorAll('.week-btn');
            btns.forEach(btn => {
                if (parseInt(btn.dataset.week) === w) {
                    btn.className = "week-btn px-4 py-2 rounded-xl text-xs font-bold transition-all bg-white shadow-sm text-blue-600";
                } else {
                    btn.className = "week-btn px-4 py-2 rounded-xl text-xs font-bold transition-all text-slate-400 hover:text-slate-600";
                }
            });
            renderDays();
        }

        function updateHeader() {
            document.getElementById('current-month-title').innerText = months[state.currentMonth];
            document.getElementById('month-description').innerText = (curriculum[state.currentMonth] || curriculum[0]).theme;
            document.getElementById('month-badge').innerText = `LVL ${(state.currentMonth + 1).toString().padStart(2, '0')}`;
        }

        function toggleChatFullscreen() {
            const container = document.getElementById('ai-chat-container');
            container.classList.toggle('chat-full');
            document.body.style.overflow = container.classList.contains('chat-full') ? 'hidden' : 'auto';
        }

        async function callGemini(userPrompt) {
            const chatWin = document.getElementById('chat-window');
            
            if (!apiKey) {
                setTimeout(() => {
                    addBotMessage(`[Demo Modu]: "${state.selectedTopic || 'Seçilmiş mövzu'}" haqqında sualınızı aldım. API açarı daxil edildikdə mən sizə tam dəstək verəcəm.`);
                }, 500);
                return;
            }

            const typing = addBotMessage("AI Dəstək düşünür...");
            
            try {
                const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash-preview-09-2025:generateContent?key=${apiKey}`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        contents: [{ parts: [{ text: userPrompt }] }],
                        systemInstruction: { 
                            parts: [{ text: `Sən proqramlaşdırma üzrə AI Dəstək sistemisən. Kontekst Mövzu: ${state.selectedTopic || 'Ümumi Proqramlaşdırma'}. Sənə verilən suallara Azərbaycan dilində, sadə, texniki cəhətdən doğru və aydın cavablar verməlisən. Əgər kod nümunəsi lazımdırsa, mütləq Markdown formatında təqdim et.` }] 
                        }
                    })
                });

                const data = await response.json();
                typing.remove();
                const responseText = data.candidates?.[0]?.content?.parts?.[0]?.text || "Təəssüf ki, cavab hazırlana bilmədi.";
                addBotMessage(responseText);
            } catch (err) {
                typing.remove();
                addBotMessage("Bağlantı xətası baş verdi. Zəhmət olmasa bir az sonra yenidən cəhd edin.");
            }
        }

        function addBotMessage(text) {
            const win = document.getElementById('chat-window');
            const div = document.createElement('div');
            div.className = "ai-message bot-message animate-fade";
            div.innerHTML = text.replace(/\n/g, '<br>').replace(/```([\s\S]*?)```/g, '<pre class="bg-slate-800 text-slate-100 p-3 rounded-lg my-2 overflow-x-auto"><code>$1</code></pre>');
            win.appendChild(div);
            win.scrollTop = win.scrollHeight;
            return div;
        }

        function addUserMessage(text) {
            const win = document.getElementById('chat-window');
            const div = document.createElement('div');
            div.className = "ai-message user-message animate-fade";
            div.innerText = text;
            win.appendChild(div);
            win.scrollTop = win.scrollHeight;
        }

        function sendMessage() {
            const input = document.getElementById('chat-input');
            const val = input.value.trim();
            if(!val) return;
            
            if(!state.selectedTopic) {
                addBotMessage("Zəhmət olmasa əvvəlcə öyrəndiyiniz günü/mövzunu seçin ki, sizə daha yaxşı kömək edə bilim.");
                return;
            }

            addUserMessage(val);
            input.value = "";
            callGemini(val);
        }

        function askAIPreset(text) {
            if(!state.selectedTopic) {
                addBotMessage("Mövzu seçilməyib.");
                return;
            }
            addUserMessage(text);
            callGemini(text);
        }

        window.onload = init;
    </script>
</body>
</html>
